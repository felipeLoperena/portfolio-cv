name: Deploy to GitHub Pages

# Builds the Astro site and publishes it to GitHub Pages on every push to main.
# Setup (one time): repo Settings → Pages → "Build and deployment" → Source:
# "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

# Permissions required for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installs dependencies, runs `astro build`, and uploads ./dist as the
      # Pages artifact. Reads `base`/`site` from astro.config.mjs.
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
